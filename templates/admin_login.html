{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded shadow p-6">
  <h1 class="text-2xl font-bold mb-4">Admin Login</h1>
  <form method="POST" class="grid gap-3">
    <input name="username" class="border rounded px-3 py-2" placeholder="Username" required />
    <input type="password" name="password" class="border rounded px-3 py-2" placeholder="Password" required />
    <button class="bg-slate-900 text-white rounded px-4 py-2">Login</button>
  </form>
</div>
{% endblock %}
