{% extends 'base.html' %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">E-Paper Archive</h1>
<div class="grid gap-3">
  {% for edition in editions %}
    <div class="bg-white rounded shadow p-4 flex items-center justify-between">
      <span class="font-medium">Edition: {{ edition.edition_date.strftime('%d %b %Y') }}</span>
      <div class="space-x-2">
        <a class="px-3 py-2 rounded bg-slate-900 text-white" target="_blank" href="{{ url_for('uploaded_file', filename=edition.pdf_file) }}">View</a>
        <a class="px-3 py-2 rounded bg-slate-200" download href="{{ url_for('uploaded_file', filename=edition.pdf_file) }}">Download</a>
      </div>
    </div>
  {% else %}
    <p>No editions yet.</p>
  {% endfor %}
</div>
{% endblock %}
