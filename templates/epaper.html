{% extends 'base.html' %}
{% block title %}E-Paper • Dhakar Samachar{% endblock %}
{% block content %}
<h1 class="mb-4 text-2xl font-bold">E-Paper Archive</h1>
<div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
  {% for edition in editions %}
    <div class="rounded-xl bg-white p-4 shadow-sm ring-1 ring-slate-200">
      <p class="text-xs uppercase tracking-wide text-slate-500">Daily Edition</p>
      <h2 class="mt-1 text-lg font-semibold">{{ edition.edition_date.strftime('%d %b %Y') }}</h2>
      <div class="mt-4 flex gap-2">
        <a class="rounded bg-slate-900 px-3 py-2 text-sm font-medium text-white" target="_blank" href="{{ url_for('uploaded_file', filename=edition.pdf_file) }}">View PDF</a>
        <a class="rounded bg-slate-200 px-3 py-2 text-sm font-medium" download href="{{ url_for('uploaded_file', filename=edition.pdf_file) }}">Download</a>
      </div>
    </div>
  {% else %}
    <p class="text-slate-600">No editions yet.</p>
  {% endfor %}
</div>
{% endblock %}
