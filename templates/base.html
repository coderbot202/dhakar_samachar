<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Dhakar Samachar</title>
  </head>
  <body class="bg-slate-100 text-slate-900">
    <header class="bg-white shadow sticky top-0 z-20">
      <nav class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
        <a href="{{ url_for('home') }}" class="font-bold text-xl">Dhakar Samachar</a>
        <div class="flex gap-4 text-sm font-medium">
          <a href="{{ url_for('shorts_feed') }}">Shorts</a>
          <a href="{{ url_for('epaper_archive') }}">E-Paper</a>
          <a href="{{ url_for('search') }}">Search</a>
          <a href="{{ url_for('admin_dashboard') }}">Panel</a>
        </div>
      </nav>
    </header>

    <main class="max-w-6xl mx-auto p-4">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="space-y-2 mb-4">
            {% for category, message in messages %}
              <div class="rounded px-4 py-2 {{ 'bg-red-100 text-red-700' if category == 'error' else 'bg-green-100 text-green-700' }}">
                {{ message }}
              </div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>

    <footer class="border-t bg-white mt-6">
      <div class="max-w-6xl mx-auto px-4 py-4 text-sm flex gap-4">
        <a href="{{ url_for('privacy_policy') }}">Privacy Policy</a>
        <a href="{{ url_for('terms_and_conditions') }}">Terms & Conditions</a>
      </div>
    </footer>
  </body>
</html>
