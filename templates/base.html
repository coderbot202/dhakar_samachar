<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>{% block title %}Dhakar Samachar{% endblock %}</title>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-900">
    <header class="sticky top-0 z-50 border-b border-slate-200 bg-white/95 backdrop-blur">
      <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3">
        <a href="{{ url_for('home') }}" class="text-xl font-black tracking-tight">Dhakar Samachar</a>
        <nav class="hidden gap-5 text-sm font-semibold md:flex">
          <a class="hover:text-blue-600" href="{{ url_for('home') }}">Home</a>
          <a class="hover:text-blue-600" href="{{ url_for('shorts_feed') }}">Shorts</a>
          <a class="hover:text-blue-600" href="{{ url_for('epaper_archive') }}">E-Paper</a>
          <a class="hover:text-blue-600" href="{{ url_for('search') }}">Search</a>
          <a class="hover:text-blue-600" href="{{ url_for('admin_dashboard') }}">Admin</a>
        </nav>
      </div>
    </header>

    <main class="mx-auto max-w-7xl p-4 md:p-6">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="mb-4 space-y-2">
            {% for category, message in messages %}
              <div class="rounded-lg px-4 py-3 text-sm {{ 'bg-red-100 text-red-700' if category == 'error' else 'bg-emerald-100 text-emerald-700' }}">
                {{ message }}
              </div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>

    <script>
      const shortsContainer = document.querySelector('[data-shorts-container]');
      if (shortsContainer) {
        shortsContainer.addEventListener('wheel', (e) => {
          e.preventDefault();
          shortsContainer.scrollBy({ top: e.deltaY > 0 ? shortsContainer.clientHeight : -shortsContainer.clientHeight, behavior: 'smooth' });
        }, { passive: false });
      }
    </script>
  </body>
</html>
