name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [dhakar-samachar-frontend, dhakar-samachar-backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: ${{ matrix.project }}
      - run: npm run build
        working-directory: ${{ matrix.project }}
